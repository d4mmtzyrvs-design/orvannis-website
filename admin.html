<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Orvannis</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/main.css">
  <script src="site.config.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js" defer></script>
  <style>
    .admin-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8);
      background: var(--color-bg);
    }
    .admin-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-xl);
      padding: var(--sp-10) var(--sp-10);
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .admin-card::before {
      content: '';
      display: block;
      height: 3px;
      margin: calc(-1 * var(--sp-10)) calc(-1 * var(--sp-10)) var(--sp-8);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      background: linear-gradient(90deg, transparent 5%, var(--copper-muted) 30%, var(--copper-bright) 50%, var(--copper-muted) 70%, transparent 95%);
    }
    .admin-icon {
      width: 52px;
      height: 52px;
      border-radius: var(--r-full);
      background: var(--color-primary-pale);
      border: 1px solid var(--color-primary-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary);
      margin: 0 auto var(--sp-5);
    }
    .admin-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--color-heading);
      margin-bottom: var(--sp-2);
    }
    .admin-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--sp-8);
    }
    .admin-form { display: flex; flex-direction: column; gap: var(--sp-4); text-align: left; }
    .admin-label {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--sp-2);
      display: block;
    }
    .admin-input {
      width: 100%;
      padding: var(--sp-3) var(--sp-4);
      font-size: var(--text-sm);
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      outline: none;
      transition: border-color var(--dur-fast) var(--ease-out),
                  box-shadow var(--dur-fast) var(--ease-out);
    }
    .admin-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-pale);
    }
    .admin-note {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      margin-top: var(--sp-6);
      text-align: center;
    }
    .admin-back {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      margin-top: var(--sp-5);
      transition: color var(--dur-fast) var(--ease-out);
    }
    .admin-back:hover { color: var(--color-primary); }
    .badge-placeholder {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-faint);
      border: 1px dashed var(--color-border);
      border-radius: var(--r-full);
      padding: var(--sp-1) var(--sp-3);
      margin-bottom: var(--sp-6);
    }
  </style>
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-R4H89ZW2H5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-R4H89ZW2H5');
  </script>
</head>
<body>

<main class="admin-page">
  <div class="admin-card">
    <div class="admin-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <span class="badge-placeholder">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
      Placeholder — Not Active
    </span>
    <h1 class="admin-title">Site Admin</h1>
    <p class="admin-subtitle">Orvannis internal access. This portal is under construction.</p>

    <form class="admin-form" onsubmit="return false;">
      <div>
        <label class="admin-label" for="admin-email">Admin Email</label>
        <input class="admin-input" type="email" id="admin-email" placeholder="brian@orvannis.com" autocomplete="email">
      </div>
      <div>
        <label class="admin-label" for="admin-pass">Password</label>
        <input class="admin-input" type="password" id="admin-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:var(--sp-2)" disabled>
        Sign In
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      </button>
    </form>

    <p class="admin-note">Authentication will be connected when the Orvannis platform launches.</p>

    <a href="index.html" class="admin-back">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to site
    </a>
  </div>
</main>

</body>
</html>
