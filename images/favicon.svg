<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark stone background -->
  <rect width="32" height="32" rx="6" fill="#33302B"/>
  <!-- Outer copper ring -->
  <circle cx="16" cy="16" r="11" stroke="#B87333" stroke-width="2" fill="none"/>
  <!-- Inner dashed copper ring -->
  <circle cx="16" cy="16" r="6" stroke="#CD8B52" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
  <!-- Copper accent dot at top (loop start) -->
  <circle cx="16" cy="5" r="1.5" fill="#B87333"/>
</svg>
